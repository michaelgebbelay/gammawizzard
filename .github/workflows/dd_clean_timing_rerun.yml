name: DD clean-timing rerun

# Re-runs the DD-reduction sweep with corrected timing (no same-day lookahead).
# Variant emits weight[t]; simulator does shift(1) before applying to return[t].
# Includes diagnostic metrics (turnover, exits, exposure during named drawdowns)
# and slippage sensitivity at 10/25/50bp.
#
# Trigger: gh workflow run dd_clean_timing_rerun.yml

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pandas==3.0.2" \
            "numpy==2.4.4" \
            "yfinance==0.2.66"
      - name: Run sweep
        run: |
          set -o pipefail
          mkdir -p out
          python scripts/conviction/backtest/dd_clean_timing_rerun.py \
            --out-dir out 2>&1 | tee out/run.log
      - name: Show summary
        if: always()
        run: |
          if [ -f out/summary.txt ]; then
            echo "=== summary.txt ==="
            cat out/summary.txt
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dd_clean_timing_rerun
          path: out/
          retention-days: 14
