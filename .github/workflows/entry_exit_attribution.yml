name: Entry/Exit attribution HYST × D2 (2x2)

# Attribution test: isolate whether C1-HYST's edge over D2 comes from the
# entry rule, the exit rule, or both. Strategies HH/DD/DH/HD.
# DH = D2 entry + HYST exit (proposed hybrid)
# HD = HYST entry + D2 exit (inverse control)
#
# Trigger: gh workflow run entry_exit_attribution.yml

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pandas==3.0.2" \
            "numpy==2.4.4" \
            "pyarrow==24.0.0" \
            "yfinance==0.2.66"

      - name: Run attribution
        run: |
          set -o pipefail
          mkdir -p out
          python scripts/conviction/backtest/entry_exit_attribution.py \
            --no-cache \
            --out-dir out 2>&1 | tee out/run.log

      - name: Show summary
        if: always()
        run: |
          if [ -f out/summary.txt ]; then
            echo "=== summary.txt ==="
            cat out/summary.txt
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: entry_exit_attribution
          path: out/
          retention-days: 14
