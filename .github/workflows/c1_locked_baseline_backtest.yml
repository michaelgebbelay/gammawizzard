name: C1 Locked Baseline + Variants Backtest

# Comprehensive backtest: Baseline C1 (QQQ hard-trend -> TQQQ/BIL) plus
# 6 variants, across 3 windows and 3 slippage cases. Pulls adjusted OHLC
# directly from yfinance (auto_adjust=True for total-return adjusted bars
# back to 2019-01-01).
#
# Trigger:
#   gh workflow run c1_locked_baseline_backtest.yml

on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pandas==3.0.2" \
            "numpy==2.4.4" \
            "pyarrow==24.0.0" \
            "yfinance==0.2.65"

      - name: Run backtest
        run: |
          set -o pipefail
          mkdir -p out
          python scripts/conviction/backtest/c1_locked_baseline_backtest.py \
            --out-dir out --no-cache 2>&1 | tee out/run.log

      - name: Show summary
        if: always()
        run: |
          if [ -f out/summary.txt ]; then cat out/summary.txt; fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: c1_locked_baseline_backtest
          path: out/
          retention-days: 14
