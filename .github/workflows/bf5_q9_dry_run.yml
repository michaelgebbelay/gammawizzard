name: BF5 Q9 Dry Run

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = no order submission, false = submit live order"
        required: true
        default: "true"
      sizing_override:
        description: "Optional account size override (e.g. 20000)"
        required: false
        default: ""
      use_adaptive_cadence:
        description: "Enable adaptive cadence gate"
        required: true
        default: "true"
      entry_weekdays:
        description: "Fallback weekdays when adaptive cadence disabled (0=Mon..6=Sun)"
        required: false
        default: "0,1,2"

jobs:
  dryrun:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONUNBUFFERED: "1"

      # Schwab
      SCHWAB_APP_KEY:     ${{ secrets.SCHWAB_APP_KEY }}
      SCHWAB_APP_SECRET:  ${{ secrets.SCHWAB_APP_SECRET }}
      SCHWAB_TOKEN_JSON:  ${{ secrets.SCHWAB_TOKEN_JSON }}

      # GammaWizard
      GW_EMAIL:           ${{ secrets.GW_EMAIL }}
      GW_PASSWORD:        ${{ secrets.GW_PASSWORD }}
      GW_TOKEN:           ${{ secrets.GW_TOKEN }}
      GW_BASE:            "https://gandalf.gammawizard.com"
      GW_ENDPOINT:        "rapi/GetUltraPureConstantStable"

      # BF5 config
      BF_DRY_RUN: ${{ github.event.inputs.dry_run }}
      BF_LOG_PATH: "logs/bf_q9_gh_dry_run.csv"
      BF_USE_ADAPTIVE_CADENCE: ${{ github.event.inputs.use_adaptive_cadence }}
      BF_ENTRY_WEEKDAYS: ${{ github.event.inputs.entry_weekdays }}
      SIZING_DOLLARS_OVERRIDE: ${{ github.event.inputs.sizing_override }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run BF5 Q9 orchestrator in dry run mode
        run: |
          python scripts/trade/ButterflyQ9/orchestrator_bf5.py

      - name: Show latest dry-run row
        if: always()
        run: |
          if [[ -f logs/bf_q9_gh_dry_run.csv ]]; then
            echo "--- LAST LOG ROW ---"
            tail -n 2 logs/bf_q9_gh_dry_run.csv
          else
            echo "No BF log file produced"
          fi

      - name: Upload dry-run csv artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bf5-q9-dryrun-log
          path: logs/bf_q9_gh_dry_run.csv
          if-no-files-found: warn
