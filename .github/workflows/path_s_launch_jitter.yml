name: Path-S Launch Date Jitter

# Tests path-dependence of single-position Path S vs top-2 by re-running
# the strategy from different ACTIVE-PERIOD launch dates. Earlier 2022
# launches were redundant (strategy was idle in cash until 2023-01-27 PCG
# entry, so any pre-2023 launch produces identical results) — this matrix
# focuses on launches DURING active trading windows where path-dependence
# can actually manifest.
#
# 6 launches × 2 modes (single + top-2) = 12 parallel jobs.
#
# Trigger:
#   gh workflow run path_s_launch_jitter.yml -f end_date=2026-04-29

on:
  workflow_dispatch:
    inputs:
      end_date:
        description: "End date (YYYY-MM-DD)"
        type: string
        default: "2026-04-29"

jobs:
  jitter:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        include:
          # Single-position — active period launches
          - { mode: "single", positions: "1", launch: "2022-05-02", offset: "baseline" }
          - { mode: "single", positions: "1", launch: "2023-04-28", offset: "post1y" }
          - { mode: "single", positions: "1", launch: "2023-10-30", offset: "post1.5y" }
          - { mode: "single", positions: "1", launch: "2024-01-15", offset: "post1.7y" }
          - { mode: "single", positions: "1", launch: "2024-10-31", offset: "post2.5y" }
          - { mode: "single", positions: "1", launch: "2025-04-30", offset: "post3y" }
          # Top-2 — same launches
          - { mode: "top2",   positions: "2", launch: "2022-05-02", offset: "baseline" }
          - { mode: "top2",   positions: "2", launch: "2023-04-28", offset: "post1y" }
          - { mode: "top2",   positions: "2", launch: "2023-10-30", offset: "post1.5y" }
          - { mode: "top2",   positions: "2", launch: "2024-01-15", offset: "post1.7y" }
          - { mode: "top2",   positions: "2", launch: "2024-10-31", offset: "post2.5y" }
          - { mode: "top2",   positions: "2", launch: "2025-04-30", offset: "post3y" }
    name: "${{ matrix.mode }}_${{ matrix.offset }}_${{ matrix.launch }}"

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync backtest data from S3
        run: |
          mkdir -p scripts/conviction/backtest/data
          aws s3 sync s3://gamma-sim-cache/conviction-backtest-data/ scripts/conviction/backtest/data/ \
            --exclude "day_aggs_raw/*" --no-progress
          ls -lh scripts/conviction/backtest/data/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pandas==3.0.2" \
            "numpy==2.4.4" \
            "pyarrow==24.0.0" \
            "scipy==1.17.1" \
            "boto3==1.43.1" \
            "pyyaml==6.0.3" \
            "requests==2.33.1" \
            "schwab-py==1.5.1"

      - name: Run replay (jitter)
        run: |
          set -o pipefail
          mkdir -p out
          SUFFIX="${{ matrix.mode }}_${{ matrix.offset }}"
          LOG="out/$SUFFIX.log"
          python scripts/conviction/backtest/replay.py \
            --strategy pathS --skew-direction bullish --skew-z-min 3.0 \
            --universe-top-n 2000 --positions ${{ matrix.positions }} \
            --regime-gate spy --trailing-pct 20 --max-hold-days 90 \
            --source massive --ignore-themes --exit-rule trailing_pct \
            --skew-z-window 60 \
            --days 1825 \
            --launch-date ${{ matrix.launch }} \
            --end-date ${{ inputs.end_date }} \
            --run-suffix $SUFFIX \
            2>&1 | tee "$LOG"

      - name: Collect results
        if: always()
        run: |
          if [ -d scripts/conviction/backtest/results ]; then
            cp -r scripts/conviction/backtest/results out/results || true
          fi
          ls -R out || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.mode }}_${{ matrix.offset }}
          path: out/
          retention-days: 14
