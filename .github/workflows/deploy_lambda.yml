name: Deploy Trading Lambda

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no real orders)"
        type: choice
        options: ["true", "false"]
        default: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install AWS SAM CLI
        run: |
          curl -Ls https://github.com/aws/aws-sam-cli/releases/latest/download/aws-sam-cli-linux-x86_64.zip -o aws-sam-cli-linux-x86_64.zip
          unzip -q aws-sam-cli-linux-x86_64.zip -d sam-installation
          sudo ./sam-installation/install --update
          sam --version

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: SAM build
        run: cd lambda && sam build

      - name: SAM deploy
        run: |
          cd lambda && sam deploy \
            --stack-name gamma-trading \
            --resolve-s3 \
            --resolve-image-repos \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DryRun=${{ github.event.inputs.dry_run }}
