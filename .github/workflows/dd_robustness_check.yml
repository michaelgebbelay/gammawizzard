name: DD robustness check (parameter sweep + sub-window decomposition)

# Narrow follow-up to dd_reduction_research: parameter-sweep trailing stops
# and vol targets, plus check whether wins persist across regime sub-windows
# (W1 2011-2017, W2 2018-2021, W3 2022-2026).
#
# Trigger: gh workflow run dd_robustness_check.yml

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pandas==3.0.2" \
            "numpy==2.4.4" \
            "yfinance==0.2.66"
      - name: Run sweep
        run: |
          set -o pipefail
          mkdir -p out
          python scripts/conviction/backtest/dd_robustness_check.py \
            --out-dir out 2>&1 | tee out/run.log
      - name: Show summary
        if: always()
        run: |
          if [ -f out/summary.txt ]; then
            echo "=== summary.txt ==="
            cat out/summary.txt
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dd_robustness_check
          path: out/
          retention-days: 14
