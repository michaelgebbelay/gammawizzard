name: Non-MA regime TQQQ/BIL backtest

# Six non-moving-average regime strategies (R1, D1, D2, V1, S1, VX1) for the
# TQQQ/BIL rotation, plus C1-HYST as benchmark. Pulls SPY/QQQ/TQQQ/BIL/^VIX
# from yfinance. Tests across windows L (2011), A (2021), B (2022), C (2022-Feb)
# at slippage 3/10/25/50 bp.
#
# Trigger: gh workflow run non_ma_regime_backtest.yml

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pandas==3.0.2" \
            "numpy==2.4.4" \
            "pyarrow==24.0.0" \
            "yfinance==0.2.66"

      - name: Run backtest
        run: |
          set -o pipefail
          mkdir -p out
          python scripts/conviction/backtest/non_ma_regime_backtest.py \
            --no-cache \
            --out-dir out 2>&1 | tee out/run.log

      - name: Show summary
        if: always()
        run: |
          if [ -f out/summary.txt ]; then
            echo "=== summary.txt ==="
            cat out/summary.txt
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: non_ma_regime_backtest
          path: out/
          retention-days: 14
