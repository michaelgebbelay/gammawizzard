# Curated narrative-theme overlay.
#
# yfinance gives us GICS sectors (Technology, Energy, etc.) but those are too
# broad for cult-stock identification. This file overlays sector classification
# with finer-grained themes that actually drive the names the user cares about.
#
# A ticker can belong to multiple themes — order doesn't matter. Unknown
# tickers fall back to their yfinance sector only (no theme tags).
#
# Edit freely. Add new themes / new tickers as the narrative landscape shifts.

themes:
  AI_INFRA:
    description: GPU/chip/networking/power infrastructure for AI buildout
    tickers: [NVDA, AMD, AVGO, ASML, LRCX, KLAC, AMAT, TSM, MU, MRVL, ARM, SMCI, DELL, ANET, VRT, CRDO, ALAB, PANW, JNPR, CIEN]

  AI_SOFTWARE:
    description: Software platforms riding the AI demand wave
    tickers: [PLTR, SNOW, NET, MDB, NOW, CRM, ORCL, ADBE, GOOGL, META, MSFT, IBM]

  CYBERSECURITY:
    description: Cybersecurity platform consolidation
    tickers: [CRWD, PANW, ZS, S, OKTA, FTNT, NET, FFIV, CHKP, CYBR, VRNS, RBRK]

  BITCOIN_PROXY:
    description: Names whose price is heavily driven by BTC and crypto markets
